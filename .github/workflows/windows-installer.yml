name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build executable and installer
        shell: cmd
        run: scripts\build_windows.bat

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleGuiDemoSetup
          path: dist/installer/SimpleGuiDemoSetup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload unpacked app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleGuiDemo-Windows
          path: dist/SimpleGuiDemo/
          if-no-files-found: error
          retention-days: 14

